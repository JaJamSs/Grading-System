{% extends 'core/base.html' %}
{% load static %}

{% block title %}Add Course{% endblock %}

{% block header %}
Add Course
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/grading.css' %}">
{% endblock %}

{% block content %}

<div class="form-box">

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="save-btn">
            Save Course
        </button>
    </form>

</div>

{% endblock %}
