{% extends 'core/base.html' %}
{% load static %}

{% block header %}Class List{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/grading.css' %}">
{% endblock %}


{% block content %}

<h2>Add Class List</h2>

<form method="post">
    {% csrf_token %}

    <div>
        {{ form.section.label }}
        {{ form.section }}
    </div>

    <br>

    <div>
        {{ form.data.label }}
        {{ form.data }}
    </div>

    <br>

    <button type="submit">Upload Class List</button>
</form>

{% endblock %}
