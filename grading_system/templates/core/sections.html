{% extends 'core/base.html' %}

{% block header %}Sections{% endblock %}

{% block content %}

<a href="{% url 'grading_system:add_section' %}" class="add-btn">
    + Add Section
</a>

<div class="dept-grid">
    {% for s in sections %}
    <div class="dept-card">
        <h3>{{ s.name }}</h3>
        <p><b>Course:</b> {{ s.course.name }}</p>
        <p><b>Faculty:</b> {{ s.faculty.name }}</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
